name: Dependency Audit (Reusable)

# Flags known-vulnerable dependencies. The consuming repo decides cadence
# (PR + weekly schedule) in its caller workflow.

on:
  workflow_call:
    inputs:
      audit-level:
        type: string
        default: "high"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm audit --audit-level=${{ inputs.audit-level }}
