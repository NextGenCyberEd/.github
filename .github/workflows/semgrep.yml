name: Semgrep SAST (Reusable)

# Static analysis for JS/TS/React plus NGCE custom Supabase rules.
#
# NOTE: the custom Supabase rules live canonically in this repo at
# semgrep-rules/supabase.yml. They are inlined below so the workflow is
# self-contained and does not need to check out this private repo from the
# consuming repo (which would require a PAT on the Free plan). When we move to
# a shared checked-out rule, replace the "Write custom rules" step with a
# checkout of this repo and point --config at semgrep-rules/supabase.yml.

on:
  workflow_call:

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Write NGCE custom Supabase rules
        run: |
          mkdir -p .NGCE-semgrep
          cat > .NGCE-semgrep/supabase.yml <<'EOF'
          rules:
            - id: supabase-service-role-in-public-env
              languages: [generic]
              severity: ERROR
              message: >
                Supabase service_role key exposed via a NEXT_PUBLIC_ variable.
                NEXT_PUBLIC_ values are bundled into client code. Use the anon
                key client-side and keep service_role server-only.
              pattern-regex: 'NEXT_PUBLIC_[A-Z0-9_]*(SERVICE_ROLE|SERVICE_KEY)'
              paths:
                include: ['*.ts','*.tsx','*.js','*.jsx','*.env','*.env.*']
            - id: supabase-service-role-in-component-file
              languages: [generic]
              severity: WARNING
              message: >
                Possible service_role key reference in a component file. Verify
                server-only — service_role bypasses RLS. Tune after first run.
              pattern-regex: '(SUPABASE_SERVICE_ROLE_KEY|SUPABASE_SERVICE_KEY)'
              paths:
                include: ['*.tsx','*.jsx']
          EOF

      - name: Run Semgrep
        # --error makes the job fail (exit non-zero) when findings are present.
        # Registry pack names should be confirmed on the first run; swap any that
        # do not resolve. p/default and p/secrets are the safe baseline.
        run: |
          semgrep scan \
            --config p/default \
            --config p/secrets \
            --config p/typescript \
            --config p/react \
            --config .NGCE-semgrep/supabase.yml \
            --error
