name: Build Check (Reusable)

# Confirms the app builds before anything reaches develop or main.

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
