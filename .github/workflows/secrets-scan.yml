name: Secrets Scan (Reusable)

# Reusable workflow. Called by consuming repos via `uses:`.
# Scans for verified, committed credentials with TruffleHog.
#
# We deliberately do NOT set base/head. The action derives the correct commit
# range from the event automatically (push: before..after, PR: base..head).
# Hard-coding base=default_branch + head=HEAD breaks on merge-to-main, where
# the two resolve to the same commit and the action errors with
# "BASE and HEAD commits are the same."

on:
  workflow_call:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified